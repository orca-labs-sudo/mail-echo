version: '3.8'

services:
  app:
    build: .
    container_name: mail-echo-app
    restart: unless-stopped
    env_file: .env
    working_dir: /app
    ports:
      - "8010:8010"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8010

  mcp:
    build: .
    container_name: mail-echo-mcp
    restart: unless-stopped
    env_file: .env
    working_dir: /app
    ports:
      - "8002:8002"
    volumes:
      - ./:/app
    command: python app/mcp_server.py

networks:
  default:
    external: true
    name: kanzlei-network


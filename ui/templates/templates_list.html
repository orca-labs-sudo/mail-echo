{% extends "base.html" %}
{% block content %}
<h2>Templates</h2>
<a href="/templates/new" style="display:inline-block; margin-bottom:10px; padding:8px 12px; background:#28a745; color:white; text-decoration:none; border-radius:3px;">+ Neues Template</a>
<div id="templates-container">Lade Templates...</div>
<script>
    fetch('/api/templates/').then(r => r.json()).then(data => {
        const container = document.getElementById('templates-container');
        if(!data.length) return container.innerText = 'Keine Templates gefunden.';
        let html = '<table><tr><th>ID</th><th>Name</th><th>Stufe</th><th>Betreff</th><th>Freigegeben</th><th>Aktionen</th></tr>';
        data.forEach(t => {
            html += `<tr>
                <td>${t.id}</td>
                <td>${t.name}</td>
                <td>${t.stufe}</td>
                <td>${t.betreff}</td>
                <td>${t.freigegeben ? 'Ja' : 'Nein'}</td>
                <td>
                    <a href="/templates/${t.id}/edit">Bearbeiten</a> |
                    <a href="/api/templates/${t.id}/vorschau" target="_blank">Vorschau</a> |
                    ${!t.freigegeben ? `<button onclick="freigeben(${t.id})">Freigeben</button>` : ''}
                </td>
            </tr>`;
        });
        html += '</table>';
        container.innerHTML = html;
    });

    function freigeben(id) {
        fetch(`/api/templates/${id}/freigeben`, {method: 'POST'}).then(() => location.reload());
    }
</script>
{% endblock %}

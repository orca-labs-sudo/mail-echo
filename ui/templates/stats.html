{% extends "base.html" %}
{% block content %}
<h2>Statistiken</h2>
<div id="stats-container">Lade Statistiken...</div>
<script>
    fetch('/api/stats/').then(r => r.json()).then(data => {
        const container = document.getElementById('stats-container');
        let html = `
            <div style="display:flex; gap:20px; margin-bottom:20px;">
                <div style="flex:1; background:#e9ecef; padding:20px; border-radius:5px;">
                    <h3>Leads Gesamt</h3>
                    <p style="font-size:24px; font-weight:bold;">${data.gesamt_leads}</p>
                </div>
                <div style="flex:1; background:#e9ecef; padding:20px; border-radius:5px;">
                    <h3>Versendete Mails</h3>
                    <p style="font-size:24px; font-weight:bold;">${data.mails_versendet.stufe_1 + data.mails_versendet.stufe_2 + data.mails_versendet.stufe_3}</p>
                    <small>Stufe 1: ${data.mails_versendet.stufe_1} | Stufe 2: ${data.mails_versendet.stufe_2} | Stufe 3: ${data.mails_versendet.stufe_3}</small>
                </div>
                <div style="flex:1; background:#e9ecef; padding:20px; border-radius:5px;">
                    <h3>Öffnungen</h3>
                    <p style="font-size:24px; font-weight:bold;">${data.mails_geoeffnet}</p>
                </div>
            </div>
            <h3>Status-Verteilung</h3>
            <table style="width:50%;">
                <tr><th>Status</th><th>Anzahl</th></tr>
        `;
        for (const [status, count] of Object.entries(data.status_verteilung || {})) {
            html += `<tr><td>${status}</td><td>${count}</td></tr>`;
        }
        html += '</table>';
        container.innerHTML = html;
    });
</script>
{% endblock %}
